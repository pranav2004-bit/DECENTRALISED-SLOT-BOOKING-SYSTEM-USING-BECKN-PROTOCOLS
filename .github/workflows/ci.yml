# CI pipeline — lint, test, dependency scan (SCA), static analysis (SAST), container scan, build.
# See CONTRIBUTING.md for when this must be green (every PR into main) and ARCHITECTURE.md for
# environment promotion. Jobs are structured per-app via matrix so one failing app doesn't block
# unrelated apps' status reporting.
#
# Real app source has existed for every app since Phase 1 of livetracker1.md (long closed) —
# lint/test steps are hard-blocking, no continue-on-error. A failing check here genuinely
# blocks a PR from merging, enforced by master's branch protection rule.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-python:
    name: Lint (Python — ${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [registry, beckn-gateway, BAP/backend, BPP/backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        working-directory: ${{ matrix.app }}
        run: ruff check . || test ! -f requirements.txt

  lint-node:
    name: Lint (Node — ${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [BAP/web, BPP/web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install & lint
        working-directory: ${{ matrix.app }}
        run: |
          if [ -f package.json ]; then npm ci && npm run lint; else echo "no package.json yet — Phase 1 pending"; fi

  test-python:
    name: Unit Tests (Python — ${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [registry, beckn-gateway, BAP/backend, BPP/backend]
    # Django's test runner creates a real ephemeral test database per TESTING.md — it needs an
    # actual Postgres to connect to, not a mock. Redis is required (no default) by BAP/BPP's
    # settings.py. Credentials/versions match docker-compose.yml exactly, CI-only, not real secrets.
    services:
      postgres:
        image: postgres:16-alpine # pragma: allowlist secret
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci # pragma: allowlist secret
          POSTGRES_DB: ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      # Required (no default) by every app's settings.py — dummy, CI-only values. Real network
      # calls are mocked at the HTTP boundary per TESTING.md, so URLs/paths only need to be
      # present, not reachable/real. Extra vars unused by a given matrix.app are harmless.
      DJANGO_SECRET_KEY: ci-test-only-not-a-real-secret # pragma: allowlist secret
      DATABASE_URL: postgres://ci:ci@localhost:5432/ci # pragma: allowlist secret
      REDIS_URL: redis://localhost:6379/0
      # NOT an arbitrary placeholder — every app's test suite hardcodes "http://registry:8000"
      # as the exact URL its `responses` mocks intercept (confirmed by grepping all 3 apps'
      # tests.py), matching docker-compose.yml's real service DNS name. A different value here
      # doesn't fail to connect, it fails to match any mock, which looks like a connection error.
      REGISTRY_BASE_URL: http://registry:8000
      GATEWAY_BASE_URL: http://localhost:9998
      GATEWAY_SIGNING_PRIVATE_KEY_PATH: /tmp/ci-fake-gateway-signing-key
      GATEWAY_ENCRYPTION_PRIVATE_KEY_PATH: /tmp/ci-fake-gateway-encryption-key
      BAP_SIGNING_PRIVATE_KEY_PATH: /tmp/ci-fake-bap-signing-key
      BAP_ENCRYPTION_PRIVATE_KEY_PATH: /tmp/ci-fake-bap-encryption-key
      BPP_SIGNING_PRIVATE_KEY_PATH: /tmp/ci-fake-bpp-signing-key
      BPP_ENCRYPTION_PRIVATE_KEY_PATH: /tmp/ci-fake-bpp-encryption-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run pytest with coverage
        working-directory: ${{ matrix.app }}
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
            pytest --cov --cov-fail-under=0
          else
            echo "no requirements.txt yet — Phase 1 pending"
          fi

  test-shared-python:
    name: Unit Tests (Python — shared/${{ matrix.lib }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lib: [beckn_crypto, beckn_transaction, event_bus, resilient_http]
    # These 4 shared/ libraries are framework-free (no Django — confirmed directly in each
    # tests.py's own imports) but live outside every app's own working directory, so none of
    # the per-app test-python job's pytest runs above ever discover or execute them — a real
    # gap found live while adding new tests to resilient_http/tests.py (livetracker2.md's
    # Phase 3.11 follow-up fixes) and confirming they'd actually run anywhere in CI, not just
    # manually inside a container. event_bus and resilient_http need a real Redis for their
    # Redis-backed tests (TEST_REDIS_URL, the exact env var name both files' own fixtures
    # already read); beckn_crypto and beckn_transaction don't touch Redis at all.
    services:
      redis:
        image: redis:7-alpine
        ports: ["6390:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_REDIS_URL: redis://localhost:6390/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        # No per-library requirements.txt exists (these are plain importable modules, not
        # separately packaged) — the small, explicit set actually imported across all four
        # tests.py files, confirmed by direct grep, not guessed.
        run: pip install pytest cryptography requests responses redis
      - name: Run pytest
        working-directory: shared/${{ matrix.lib }}
        run: pytest tests.py -v

  test-node:
    name: Unit Tests (Node — ${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [BAP/web, BPP/web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run tests
        working-directory: ${{ matrix.app }}
        run: |
          if [ -f package.json ]; then npm ci && npm test; else echo "no package.json yet — Phase 1 pending"; fi

  sca-dependency-scan:
    name: SCA — Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: pip-audit (Python apps)
        run: |
          pip install pip-audit
          for app in registry beckn-gateway BAP/backend BPP/backend; do
            if [ -f "$app/requirements.txt" ]; then
              pip-audit -r "$app/requirements.txt" || true
            fi
          done
      - name: npm audit (Node apps)
        run: |
          for app in BAP/web BPP/web; do
            if [ -f "$app/package.json" ]; then
              (cd "$app" && npm audit --audit-level=high || true)
            fi
          done

  sast-static-analysis:
    name: SAST — Static Code Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bandit (Python security linting)
        run: |
          pip install bandit
          for app in registry beckn-gateway BAP/backend BPP/backend; do
            if [ -d "$app" ]; then bandit -r "$app" -ll || true; fi
          done

  secrets-scan:
    name: Secrets Scan (blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: detect-secrets
        run: |
          pip install detect-secrets
          # .secrets.baseline is excluded from its own scan — its hashed_secret values
          # look like high-entropy strings otherwise. Found for real in Phase 1 Exit.
          detect-secrets scan --baseline .secrets.baseline --exclude-files '\.secrets\.baseline$'
          # --fail-on-unaudited/--fail-on-live/--fail-on-audited-real do not exist on detect-secrets'
          # real `audit` command (confirmed against the installed 1.5.0 CLI's own --help) — they were
          # never valid, which is why this step failed unconditionally the first time CI ever actually
          # ran. The real way to gate on unresolved real secrets is to check --report's own JSON output.
          detect-secrets audit --report --only-real .secrets.baseline > audit_report.json
          python -c "import json,sys; r=json.load(open('audit_report.json'))['results']; sys.exit(1 if r else 0)"

  build:
    name: Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [lint-python, lint-node, test-python, test-shared-python, test-node]
    strategy:
      matrix:
        service: [registry, beckn-gateway, BAP/backend, BAP/web, BPP/backend, BPP/web]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        # Docker image tags must be lowercase — matrix.service values like "BAP/backend" aren't,
        # which is why this step failed unconditionally the first time CI ever actually ran.
        run: |
          tag=$(echo "beckn/${{ matrix.service }}:ci" | tr '[:upper:]' '[:lower:]')
          # Context differs by service type, matching docker-compose.yml exactly:
          # backend apps (registry, beckn-gateway, BAP/backend, BPP/backend) build from the repo
          # root because they copy shared/ as a sibling of their own dir (each Dockerfile's own
          # "BUILD CONTEXT MUST BE THE REPO ROOT" comment confirms this). The web apps (BAP/web,
          # BPP/web) are self-contained Next.js projects with no shared/ dependency and build
          # from their own subdirectory instead — confirmed against their real Dockerfiles' COPY
          # paths and docker-compose.yml's `build: ./BAP/web` / `./BPP/web` shorthand.
          case "${{ matrix.service }}" in
            */web) context="${{ matrix.service }}" ;;
            *) context="." ;;
          esac
          docker build -t "$tag" -f ${{ matrix.service }}/Dockerfile "$context"

  container-scan:
    name: Container Image Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      matrix:
        service: [registry, beckn-gateway, BAP/backend, BAP/web, BPP/backend, BPP/web]
    steps:
      - uses: actions/checkout@v4
      - name: Build image for scan
        # Docker image tags must be lowercase — matrix.service values like "BAP/backend" aren't,
        # which is why this step failed unconditionally the first time CI ever actually ran.
        # Tag exported to GITHUB_ENV so the Trivy step below scans the exact image just built,
        # not a mixed-case name that was never actually built.
        run: |
          tag=$(echo "beckn/${{ matrix.service }}:ci" | tr '[:upper:]' '[:lower:]')
          # Context differs by service type, matching docker-compose.yml exactly:
          # backend apps (registry, beckn-gateway, BAP/backend, BPP/backend) build from the repo
          # root because they copy shared/ as a sibling of their own dir (each Dockerfile's own
          # "BUILD CONTEXT MUST BE THE REPO ROOT" comment confirms this). The web apps (BAP/web,
          # BPP/web) are self-contained Next.js projects with no shared/ dependency and build
          # from their own subdirectory instead — confirmed against their real Dockerfiles' COPY
          # paths and docker-compose.yml's `build: ./BAP/web` / `./BPP/web` shorthand.
          case "${{ matrix.service }}" in
            */web) context="${{ matrix.service }}" ;;
            *) context="." ;;
          esac
          docker build -t "$tag" -f ${{ matrix.service }}/Dockerfile "$context"
          echo "IMAGE_TAG=$tag" >> "$GITHUB_ENV"
      - name: Trivy scan
        # A fourth latent bug: @0.24.0 was never a real published tag (confirmed against the
        # action's actual release list — real tags carry a "v" prefix, e.g. v0.36.0, the current
        # latest stable release used here).
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          exit-code: "0" # non-blocking until Phase 1 real deps exist; tighten to "1" once app code lands
