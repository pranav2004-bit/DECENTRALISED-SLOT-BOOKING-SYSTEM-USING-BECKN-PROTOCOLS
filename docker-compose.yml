# Local/dev full-stack orchestration — 4 apps + 3 Postgres DBs + Redis.
# See README.md for setup steps and ARCHITECTURE.md for the system overview.
# STATUS: scaffolded ahead of Phase 1 application code — see README.md "Status note".
# services will not report healthy until Phase 1 lands each app's /health endpoint.

services:
  # --- Databases ---
  registry-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: registry
      POSTGRES_PASSWORD: registry  # pragma: allowlist secret
      POSTGRES_DB: registry
    volumes:
      - registry-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U registry"]
      interval: 10s
      timeout: 5s
      retries: 5

  bap-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bap
      POSTGRES_PASSWORD: bap  # pragma: allowlist secret
      POSTGRES_DB: bap
    volumes:
      - bap-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bap"]
      interval: 10s
      timeout: 5s
      retries: 5

  bpp-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bpp
      POSTGRES_PASSWORD: bpp  # pragma: allowlist secret
      POSTGRES_DB: bpp
    volumes:
      - bpp-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bpp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Cache ---
  bap-cache:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bpp-cache:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway-cache:
    image: redis:7-alpine
    # livetracker2.md §3.11: promoted from the optional with-gateway-cache profile to an
    # always-on service — no longer gated behind CACHE_ENABLED's old opt-in default. `search`
    # (§3.1) now puts Gateway on continuous, customer-facing traffic just like BAP/BPP, so its
    # circuit breaker (livetracker1.md Phase 4.2's RedisCircuitBreaker) needs to be on by
    # default too, matching BAP's/BPP's own unconditional Redis dependency instead of leaving
    # Gateway as the one inconsistent app. Backs the shared circuit-breaker state fix — without
    # it, Gateway's breaker falls back to in-memory, per-worker state and won't fail fast across
    # gunicorn's workers during a Registry outage (confirmed live in Phase 4.2 and re-confirmed
    # in §3.11 with the new default).
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Applications ---
  # registry, beckn-gateway, bap-backend, bpp-backend build from the repo root (context: .)
  # because each imports the shared/ monorepo folder (django_observability, contract_schemas)
  # as a sibling of its own project dir — see each Dockerfile's top comment for why.
  registry:
    build:
      context: .
      dockerfile: registry/Dockerfile
    env_file: ./registry/.env
    depends_on:
      registry-db:
        condition: service_healthy
    ports:
      - "8000:8000"

  beckn-gateway:
    build:
      context: .
      dockerfile: beckn-gateway/Dockerfile
    env_file: ./beckn-gateway/.env
    depends_on:
      registry:
        condition: service_started
      gateway-cache:
        condition: service_healthy
    ports:
      - "8003:8000"

  bap-backend:
    build:
      context: .
      dockerfile: BAP/backend/Dockerfile
    env_file: ./BAP/backend/.env
    depends_on:
      bap-db:
        condition: service_healthy
      bap-cache:
        condition: service_healthy
      registry:
        condition: service_started
    ports:
      - "8001:8000"

  bap-web:
    build:
      context: ./BAP/web
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8001
        NEXT_PUBLIC_WS_BASE_URL: ws://localhost:8001
    env_file: ./BAP/web/.env
    depends_on:
      - bap-backend
    ports:
      - "3000:3000"

  bpp-backend:
    build:
      context: .
      dockerfile: BPP/backend/Dockerfile
    env_file: ./BPP/backend/.env
    depends_on:
      bpp-db:
        condition: service_healthy
      bpp-cache:
        condition: service_healthy
      registry:
        condition: service_started
    ports:
      - "8002:8000"

  bpp-web:
    build:
      context: ./BPP/web
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8002
        NEXT_PUBLIC_WS_BASE_URL: ws://localhost:8002
    env_file: ./BPP/web/.env
    depends_on:
      - bpp-backend
    ports:
      - "3001:3000"

  # --- Monitoring (Phase 4.4 follow-up) ---
  # Optional, like gateway-cache — a local Prometheus/Grafana pair scraping the four
  # apps' already-real /metrics endpoints. This was previously documented as blocked
  # on "real cloud infrastructure that doesn't exist yet" — it wasn't actually blocked,
  # it just hadn't been built. `docker compose --profile with-monitoring up -d`.
  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: ["with-monitoring"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.3.1
    profiles: ["with-monitoring"]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SECURITY_ADMIN_PASSWORD: "admin"  # pragma: allowlist secret — local dev only, never exposed
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3002:3000"
    depends_on:
      - prometheus

volumes:
  registry-db-data:
  bap-db-data:
  bpp-db-data:
  prometheus-data:
  grafana-data:
